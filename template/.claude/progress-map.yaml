# progress-map.yaml — Fonte única da verdade do detector de progresso (/status).
#
# Lido por:
#   - .claude/commands/status.md  (comando interpretado pelo Claude)
#   - .claude/hooks/method-status-line.sh  (hook SessionStart, via yq)
#
# Cada etapa:
#   num            número da etapa (string p/ suportar "8.5")
#   name           rótulo humano
#   command        o que o usuário roda pra produzir o artefato
#   artifact_glob  glob que detecta existência do artefato
#   non_empty_if   substring que, se presente no artefato, indica conteúdo real
#                  (heurística anti-placeholder; vazio = só existência basta)
#   optional       true se a etapa pode ser pulada sem bloquear o fluxo
#   prereq         lista de num de etapas que são pré-requisito REAL
#   validation     3-5 critérios-chave (checklist leve) extraídos do GETTING-STARTED

steps:
  - num: "1"
    name: "Criar o projeto"
    command: "(manual) preencher CLAUDE.md seção 1 + init.sh"
    artifact_glob: "CLAUDE.md"
    non_empty_if: "## 1 · Identidade do produto"
    optional: false
    prereq: []
    validation:
      - "CLAUDE.md tem PROJECT_CATEGORY preenchido (sem {{...}})"
      - "CLAUDE.md tem STAGE preenchido"
      - "CLAUDE.md tem TEAM preenchido"

  - num: "1.5"
    name: "Discovery (opcional)"
    command: "/discovery <ideia>"
    artifact_glob: "docs/discovery/*.md"
    non_empty_if: "aposta escolhida"
    optional: true
    prereq: ["1"]
    validation:
      - "Da intuição ao problema claro (5 porquês até a causa real)"
      - "Job-to-be-done identificado"
      - "2-3 enquadramentos explorados antes de convergir"
      - "Sementes pra persona/jornada/métrica + premissa mais arriscada registradas"
      - "Aposta escolhida tem selo de evidência declarado (🔴/🟡/🟢/✅)"

  - num: "2"
    name: "Definir o produto (PRD)"
    command: "/prd <ideia>"
    artifact_glob: "docs/prd/*.md"
    non_empty_if: "##"
    optional: false
    prereq: ["1"]
    validation:
      - "Problema tem número (não 'muito tempo perdido')"
      - "Hipótese falsificável no formato 'Se X, então Y sai de Z pra W'"
      - "Escopo IN e OUT ambos claros"
      - "Métrica decisiva tem baseline + meta + fórmula + fonte"

  - num: "3"
    name: "Mapear personas"
    command: "/persona <nome>"
    artifact_glob: "docs/business-context/personas.md"
    non_empty_if: "##"
    optional: false
    prereq: ["2"]
    validation:
      - "Persona primária com nome próprio (não cargo genérico)"
      - "Dor com número"
      - "Critério de sucesso em citação > \"...\""
      - "Seção 'Quem NÃO é persona' com 3+ itens (anti-personas)"

  - num: "4"
    name: "Mapear jornadas"
    command: "/user-journey <persona>"
    artifact_glob: "docs/business-context/jornada.md"
    non_empty_if: "journey"
    optional: false
    prereq: ["3"]
    validation:
      - "1+ jornada com 'mermaid journey'"
      - "Pontos críticos amarrados a requisitos"
      - "Anti-jornadas listadas (2-4)"
      - "Métricas mapeadas em tabela"

  - num: "5"
    name: "Definir métricas"
    command: "/metrics"
    artifact_glob: "docs/business-context/metricas.md"
    non_empty_if: "##"
    optional: false
    prereq: ["2"]
    validation:
      - "3 camadas mínimas preenchidas (adoção, engajamento, valor)"
      - "Cada métrica decisiva amarra com uma hipótese do PRD (N hipóteses → N métricas)"
      - "Toda métrica tem baseline + meta + fórmula + fonte"
      - "Anti-métricas listadas (3+)"

  - num: "6"
    name: "Decisões técnicas (ADRs)"
    command: "/adr <decisão>"
    artifact_glob: "docs/decisions/ADR-*.md"
    non_empty_if: "Status"
    optional: false
    prereq: ["2"]
    validation:
      - "≥5 ADRs com Status: accepted (típico)"
      - "rules.yaml tem regra pra cada ADR com enforcement por hook"
      - "Cada ADR tem gatilho de revisão explícito"
      - "Hook testado: import que viola ADR falha no commit"

  - num: "6.5"
    name: "Pesquisa competitiva (opcional)"
    command: "/landscape"
    artifact_glob: "docs/research/*-landscape.md"
    non_empty_if: "Soluções encontradas"
    optional: true
    prereq: ["2"]
    validation:
      - "Pesquisa ancorada no problema/hipótese do PRD"
      - "Cada solução com fonte (URL) verificável"
      - "Matriz distingue table stakes de gaps de diferenciação"
      - "Curadoria conjunta feita (status por item)"
      - "Gaps priorizados viram features candidatas"

  - num: "7"
    name: "Priorizar features"
    command: "/feature-breakdown"
    artifact_glob: "docs/features/README.md"
    non_empty_if: "MUST"
    optional: false
    prereq: ["2", "6"]
    validation:
      - "3-7 features listadas"
      - "Feature-âncora marcada com ⚓ + 4 critérios"
      - "Diagrama de dependências claro"
      - "Anti-features listadas"

  - num: "7.5"
    name: "Fasear o sistema"
    command: "/phase-roadmap"
    artifact_glob: "docs/roadmap/fases-overview.md"
    non_empty_if: "Fase 0"
    optional: false
    prereq: ["7"]
    validation:
      - "TODAS as features do breakdown aparecem em alguma fase (nenhuma órfã)"
      - "Cada fase tem tempo aproximado (t-shirt ou semanas)"
      - "Fase 0 = conjunto-âncora (slice vertical mínimo que entrega valor)"
      - "Fases têm ordem por dependência (Fase N+1 não depende de feature não-faseada)"

  - num: "7.7"
    name: "Comportamento da feature (opcional)"
    command: "/feature-behavior <F<N>>"
    artifact_glob: "docs/features/*.behavior.md"
    non_empty_if: "Behavior"
    optional: true
    prereq: ["7"]
    validation:
      - "Feature expressa como comportamento observável, sem técnico"
      - "User story + cenários Gherkin nos pontos críticos"
      - "Critérios de aceite observáveis (não técnicos)"
      - "Anti-comportamento listado"

  - num: "8"
    name: "Spec da feature-âncora"
    command: "/feature-spec F1"
    artifact_glob: "docs/features/F1-*.md"
    non_empty_if: "##"
    optional: false
    prereq: ["7.5"]
    validation:
      - "Todas as features da Fase 0 (conjunto-âncora) têm spec, não só F1"
      - "Cada spec tem todas as seções preenchidas"
      - "Plano em fases de cada feature tem critério verificável"

  - num: "8.5"
    name: "Design de telas (opcional)"
    command: "/screens"
    artifact_glob: "docs/design/inventory.md"
    non_empty_if: "##"
    optional: true
    prereq: ["8"]
    validation:
      - "inventory.md lista 3-15 telas com persona+feature"
      - "flow.md tem mermaid claro"
      - "Briefs gerados para todas as telas MUST"
      - "Anti-telas listadas"

  - num: "9"
    name: "Roadmap macro"
    command: "(manual) criar docs/roadmap/"
    artifact_glob: "docs/roadmap/fases-overview.md"
    non_empty_if: "gantt"
    optional: false
    prereq: ["8"]
    validation:
      - "fases-overview.md (criado na 7.5) ganhou gate explícito por fase"
      - "1 arquivo fase-N-<nome>.md por fase com critério de gate objetivo"
      - "Anti-roadmap listado"
      - "Cada gate é verificável (teste passa / métrica observável)"

  - num: "10"
    name: "Arquitetura técnica"
    command: "(manual) criar docs/technical-context/"
    artifact_glob: "docs/technical-context/arquitetura.md"
    non_empty_if: "C4"
    optional: false
    prereq: ["6", "9"]
    validation:
      - "stack.md tem cada componente com restrição amarrada"
      - "arquitetura.md tem C4 Nível 1 e 2"
      - "Decisões refletidas como ADRs"
      - "'O que NÃO está nesta stack' listado"

  - num: "11"
    name: "Plano de execução"
    command: "/plan-phase <fase>"
    artifact_glob: "docs/superpowers/specs/*-fase-*-plan.md"
    non_empty_if: "##"
    optional: false
    prereq: ["8", "10"]
    validation:
      - "Plano passou pela revisão do @architect"
      - "Plano tem TDD em cada passo"
      - "Plano tem ≥3 checkpoints com usuário"
      - "Plano cita ADRs onde se aplicam"

  - num: "12"
    name: "Executar"
    command: "/execute <fase>"
    # Etapa 12 produz CÓDIGO, não um doc próprio. Detectamos pela existência de um
    # plano de execução marcado como em andamento (Status: running) — artefato distinto
    # do retro da Etapa 13, evitando dupla contagem.
    artifact_glob: "docs/superpowers/specs/*-fase-*-plan.md"
    non_empty_if: "running"
    optional: false
    prereq: ["11"]
    validation:
      - "Cada commit passa pelo hook sem aviso"
      - "Testes em verde antes de prosseguir"
      - "Sessão atualizada antes de pausar"

  - num: "13"
    name: "Retro da fase"
    command: "/retro <fase>"
    artifact_glob: "docs/roadmap/fase-*-retro.md"
    non_empty_if: "Decisão final"
    optional: false
    prereq: ["12"]
    validation:
      - "fase-N-retro.md existe com decisão explícita"
      - "PRD/ADRs atualizadas se necessário"
      - "Próxima fase clara ou pivot decidido"
